services:
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: softcart_sales
      MYSQL_USER: softcart_user
      MYSQL_PASSWORD: "akshat123@"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - data_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: mongo_db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: softcart_user
      MONGO_INITDB_ROOT_PASSWORD: "akshat123@"
      MONGO_INITDB_DATABASE: catalog_db
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - data_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    container_name: postgres_dwh
    restart: unless-stopped
    environment:
      POSTGRES_USER: softcart_user
      POSTGRES_PASSWORD: "akshat123@"
      POSTGRES_DB: softcart_staging
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U softcart_user -d softcart_staging"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
    driver: local
  mongo_data:
    driver: local
  postgres_data:
    driver: local

networks:
  data_network:
    driver: bridge